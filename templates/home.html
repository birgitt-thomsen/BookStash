<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  </head>
  <body>
    <h1>Book Stash</h1>

    <table>
        <tr>
            <th>Cover</th>
            <th>Title</th>
            <th>Author</th>
            <th>Published</th>
        </tr>
        {% for book, author in books %}

        <tr>
            <td>
            {% if book.isbn %}
                <img
                    src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg"
                    width="90"
                    alt="{{ book.title }}">
            {% else %}
                <img
                    src="{{ url_for('static', filename='images/no_cover.png') }}"
                    width="90"
                    alt="No cover available">
            {% endif %}
            </td>
            <td>{{ book.title }}</td>
            <td>{{ author.name }}</td>
            <td>{{ book.publication_year }}</td>
        </tr>
        {% endfor %}
    </table>
  </body>
</html>
