<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  </head>
  <body>
    <h1>Book Stash</h1>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
        </tr>
        {% for book, author in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ author.name }}</td>
        </tr>
        {% endfor %}
    </table>
  </body>
</html>
