<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  </head>
  <body>
    <h1>Book Stash</h1>

    <form class="search-form" action="{{ url_for('index') }}" method="get">

    <input
        type="text"
        name="search"
        placeholder="Search by author or title..."
        value="{{ search or '' }}">

    <input type="hidden" name="sort" value="{{ sort }}">

    <button type="submit">Search</button>

    </form>

    {% if not books %}
        <p>No books matched your search.</p>
    {% endif %}

    <table>
        <tr>
            <th><u>Cover</u></th>
            <th><a href="{{ url_for('index', search=search, sort='title') }}">
                Title
                </a>
            </th>
            <th><a href="{{ url_for('index', search=search, sort='author') }}">
                Author
                </a>
            </th>
            <th><a href="{{ url_for('index', search=search, sort='year') }}">
                Published
                </a>
            </th>
        </tr>
        {% for book, author in books %}

        <tr>
            <td>
            {% if book.isbn %}
                <img
                    src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg"
                    width="90"
                    alt="{{ book.title }}">
            {% else %}
                <img
                    src="{{ url_for('static', filename='images/no_cover.png') }}"
                    width="90"
                    alt="No cover available">
            {% endif %}
            </td>
            <td>{{ book.title }}</td>
            <td>{{ author.name }}</td>
            <td>{{ book.publication_year }}</td>
        </tr>
        {% endfor %}
    </table>
  </body>
</html>
